name: Production Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  staging-ready:
    name: Staging domain is ready
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require staging as the source branch
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "Production PRs must merge from staging into main."
            echo "Current source branch: ${{ github.head_ref }}"
            exit 1
          fi

      - name: Check staging domain
        run: |
          curl --fail --show-error --silent --location \
            --max-time 20 \
            --retry 3 \
            --retry-delay 5 \
            --user-agent "Mozilla/5.0 (compatible; portfolio-production-gate/1.0)" \
            --output /tmp/staging-home.html \
            https://staging.nick-reardon.com/

          if ! grep -qi '<meta name="robots" content="noindex' /tmp/staging-home.html; then
            echo "Staging responded, but it did not include expected noindex metadata."
            exit 1
          fi
